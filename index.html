    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .upload-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f3ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f3ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #6c757d;
            font-size: 16px;
        }

        .file-name {
            margin-top: 15px;
            color: #667eea;
            font-weight: bold;
        }

        .controls {
            padding: 25px 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            background: #f8f9fa;
        }

        .select-wrapper {
            flex: 1;
            min-width: 200px;
        }

        .select-wrapper label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .members-list {
            padding: 30px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .member-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .member-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .member-card.today {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border: 2px solid #ff9a56;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .member-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .member-details h3 {
            font-size: 20px;
            color: #212529;
            margin-bottom: 5px;
        }

        .member-details p {
            color: #6c757d;
            font-size: 14px;
            margin: 3px 0;
        }

        .member-details .info-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .member-details .info-tag {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            display: inline-block;
        }

        .member-details .tenure {
            color: #764ba2;
            font-weight: 500;
            font-size: 13px;
            margin-top: 8px;
        }

        .member-birthday {
            text-align: right;
        }

        .birthday-date {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .birthday-days {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }

        .birthday-days.soon {
            color: #ff6b6b;
            font-weight: bold;
        }

        .today-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        .stats {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 13px;
            color: #6c757d;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: 10px;
            }

            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 20px;
                margin-bottom: 5px;
            }

            .header p {
                font-size: 12px;
            }

            .upload-section {
                padding: 15px;
            }

            .upload-area {
                padding: 20px;
            }

            .upload-icon {
                font-size: 36px;
                margin-bottom: 10px;
            }

            .upload-text {
                font-size: 14px;
            }

            .controls {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
            }

            .select-wrapper {
                width: 100%;
            }

            .select-wrapper label {
                font-size: 13px;
                margin-bottom: 5px;
            }

            select {
                padding: 10px;
                font-size: 14px;
            }

            .stats {
                padding: 15px;
                gap: 20px;
            }

            .stat-value {
                font-size: 22px;
            }

            .stat-label {
                font-size: 12px;
            }

            .members-list {
                padding: 15px;
            }

            .member-card {
                padding: 12px;
                margin-bottom: 10px;
                gap: 10px;
            }

            .member-avatar {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .member-details h3 {
                font-size: 16px;
                margin-bottom: 3px;
            }

            .member-details p {
                font-size: 12px;
                margin: 2px 0;
            }

            .member-details .info-tag {
                font-size: 11px;
                padding: 1px 8px;
            }

            .member-details .tenure {
                font-size: 11px;
                margin-top: 5px;
            }

            .birthday-date {
                font-size: 18px;
            }

            .birthday-days {
                font-size: 12px;
                margin-top: 3px;
            }

            .today-badge {
                font-size: 11px;
                padding: 3px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎂 成员生日查询</h1>
            <p>数据截止 2026-05-03</p>
        </div>

        <div class="controls" id="controls">
            <div class="select-wrapper">
                <label>成员搜索</label>
                <input type="text" id="searchInput" placeholder="输入成员名字搜索..." style="width: 100%; padding: 12px 15px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 15px; transition: all 0.3s ease;" onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e9ecef'">
            </div>
            <div class="select-wrapper">
                <label>显示时间范围</label>
                <select id="timeRange">
                    <option value="7">最近 7 天</option>
                    <option value="30">最近 30 天</option>
                    <option value="999" selected>全部</option>
                </select>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalMembers">0</div>
                <div class="stat-label">总成员数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="upcomingCount">0</div>
                <div class="stat-label">即将过生日</div>
            </div>
        </div>

        <div class="members-list" id="membersList">
            <div class="empty-state">
                <div class="empty-state-icon">⏳</div>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script>
        // 数据已从 members_data.js 加载
        // membersData 变量已在全局可用
        
        const controls = document.getElementById('controls');
        const stats = document.getElementById('stats');
        const membersList = document.getElementById('membersList');
        const timeRange = document.getElementById('timeRange');
        const searchInput = document.getElementById('searchInput');
        
        // 有效成员数据
        let validMembersData = [];

        // 页面加载时直接显示数据
        window.addEventListener('DOMContentLoaded', () => {
            if (membersData && membersData.length > 0) {
                // 过滤无效数据并转换日期
                validMembersData = membersData.filter(member => {
                    return member.name && member.birthday;
                });
                
                validMembersData.forEach(member => {
                    if (member.birthday && typeof member.birthday === 'string') {
                        member.birthday = new Date(member.birthday);
                    }
                    if (member.debut && typeof member.debut === 'string') {
                        member.joinDate = new Date(member.debut);
                    }
                });
                
                displayMembers();
            } else {
                showError('数据加载失败');
            }
        });

        timeRange.addEventListener('change', () => {
            displayMembers();
        });
        
        searchInput.addEventListener('input', () => {
            displayMembers();
        });

        function getDaysUntilBirthday(birthday) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let nextBirthday = new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate());
            nextBirthday.setHours(0, 0, 0, 0);
            
            if (nextBirthday < today) {
                nextBirthday = new Date(today.getFullYear() + 1, birthday.getMonth(), birthday.getDate());
            }
            
            const diffTime = nextBirthday.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            return diffDays;
        }

        function getTenure(joinDate) {
            if (!joinDate) return null;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let years = today.getFullYear() - joinDate.getFullYear();
            let months = today.getMonth() - joinDate.getMonth();
            let days = today.getDate() - joinDate.getDate();
            
            if (days < 0) {
                months--;
                const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += prevMonth.getDate();
            }
            
            if (months < 0) {
                years--;
                months += 12;
            }
            
            return { years, months, days };
        }

        function formatTenure(joinDate) {
            if (!joinDate) return '';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const joinDateCopy = new Date(joinDate);
            joinDateCopy.setHours(0, 0, 0, 0);
            
            const diffTime = today.getTime() - joinDateCopy.getTime();
            const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            const years = Math.floor(totalDays / 365);
            const remainingDays = totalDays % 365;
            
            let result = '';
            if (years > 0) {
                result += `${years}年`;
            }
            if (remainingDays > 0 || years === 0) {
                result += `${remainingDays}日`;
            }
            
            return result;
        }

        function getAge(birthday) {
            const today = new Date();
            let age = today.getFullYear() - birthday.getFullYear();
            const monthDiff = today.getMonth() - birthday.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthday.getDate())) {
                age--;
            }
            
            return age;
        }

        function displayMembers() {
            const days = parseInt(timeRange.value);
            const searchText = searchInput.value.trim().toLowerCase();
            
            // 先按名字搜索过滤
            let searchedMembers = validMembersData;
            if (searchText) {
                searchedMembers = validMembersData.filter(member => {
                    return member.name.toLowerCase().includes(searchText);
                });
            }
            
            // 再按时间范围过滤
            const filteredMembers = searchedMembers
                .map(member => ({
                    ...member,
                    daysUntil: getDaysUntilBirthday(member.birthday)
                }))
                .filter(member => member.daysUntil <= days)
                .sort((a, b) => a.daysUntil - b.daysUntil);

            document.getElementById('totalMembers').textContent = searchedMembers.length;
            document.getElementById('upcomingCount').textContent = filteredMembers.length;

            if (filteredMembers.length === 0) {
                membersList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${searchText ? '🔍' : '🎂'}</div>
                        <p>${searchText ? `没有找到包含 "${searchInput.value}" 的成员` : `最近 ${days} 天内没有成员过生日`}</p>
                    </div>
                `;
                return;
            }

            membersList.innerHTML = filteredMembers.map(member => {
                const isToday = member.daysUntil === 0;
                const isSoon = member.daysUntil <= 3 && member.daysUntil > 0;
                const tenureStr = member.joinDate ? formatTenure(member.joinDate) : '';
                const age = getAge(member.birthday);
                
                let displayPeriod = member.period || '';
                if (displayPeriod) {
                    displayPeriod = displayPeriod.replace(/期期$/, '期');
                }
                
                return `
                    <div class="member-card ${isToday ? 'today' : ''}">
                        <div class="member-info">
                            <div class="member-avatar">
                                ${member.name.charAt(0)}
                            </div>
                            <div class="member-details">
                                <h3>${member.name} <span style="font-size: 14px; color: #6c757d; font-weight: normal;">${age}岁</span></h3>
                                <div class="info-row">
                                    ${displayPeriod ? `<span class="info-tag">${displayPeriod}</span>` : ''}
                                </div>
                                ${tenureStr ? `<p class="tenure">出道 ${tenureStr}</p>` : ''}
                            </div>
                        </div>
                        <div class="member-birthday">
                            <div class="birthday-date">
                                ${String(member.birthday.getMonth() + 1).padStart(2, '0')}月
                                ${String(member.birthday.getDate()).padStart(2, '0')}日
                            </div>
                            <div class="birthday-days ${isSoon ? 'soon' : ''}">
                                ${isToday ? '今天过生日！' : `还有 ${member.daysUntil} 天`}
                            </div>
                            ${isToday ? '<div class="today-badge">🎉 今天</div>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showError(message) {
            membersList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <p>${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
